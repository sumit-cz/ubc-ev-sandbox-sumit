version: '3.8'

services:
  redis-onix-bpp:
    image: redis:alpine
    container_name: redis-onix-bpp
    ports:
      - "6380:6379"
    command: redis-server --requirepass your-redis-password
    networks:
      - onix-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "your-redis-password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  onix-bpp-plugin:
    # Use pre-built image from Docker Hub
    image: manendrapalsingh/onix-adapter:v0.9.5
    container_name: onix-bpp-plugin
    ports:
      - "8002:8002"
    volumes:
      # Mount config directory (writable for symlink creation, but original files won't be modified)
      - ${CONFIG_PATH:-./config}/onix-bpp:/app/config
      # Mount schema directory (read-only)
      - ../schemas:/app/schemas:ro
    environment:
      - CONFIG_FILE=/app/config/adapter.yaml
      - REDIS_PASSWORD=your-redis-password
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector-bpp:4317
    restart: unless-stopped
    depends_on:
      redis-onix-bpp:
        condition: service_healthy
      otel-collector-bpp:
        condition: service_started
    networks:
      - onix-network

  # OTEL Collector for BPP - receives OTLP from onix-bpp-plugin
  otel-collector-bpp:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-bpp
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector/config-bpp.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
      - "13133:13133"
      - "55679:55679"
    networks:
      - onix-network
    restart: unless-stopped

networks:
  onix-network:
    driver: bridge
