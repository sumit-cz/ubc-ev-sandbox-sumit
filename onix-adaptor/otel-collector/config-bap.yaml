# OpenTelemetry Collector - receives OTLP from onix-bap-plugin
# BAP adapter sends to otel-collector-bap:4317
# App-level: all signals to Prometheus (metrics) and Jaeger (traces) for local debugging
# This is a participant-side local-only setup (no upstream forwarding)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    send_batch_size: 1024
    timeout: 10s
  batch/traces:
    send_batch_size: 1024
    timeout: 2s

exporters:
  # App-level: expose /metrics for Prometheus to scrape
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: onix
    const_labels:
      observability: otel-collector
      service_name: onix-ev-charging-bap

  # App-level: send traces to Jaeger for local debugging (UI at http://localhost:16686)
  otlp_grpc/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  pipelines:
    # ALL metrics -> Prometheus (stays local on the node)
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

    # ALL traces -> Jaeger (stays local on the node)
    traces:
      receivers: [otlp]
      processors: [batch/traces]
      exporters: [otlp_grpc/jaeger]

    # ALL audit logs (local storage)
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: []

  telemetry:
    logs:
      level: info
